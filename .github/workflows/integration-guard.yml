name: Integration Guard

on:
  pull_request:
  push:
    branches: [work, main]

jobs:
  config-and-submodule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup node
        uses: actions/setup-node@v6.2.0
        with:
          node-version: 24.13.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate config schema
        run: npm run validate:config

      - name: Ensure submodule URL targets blackout
        run: |
          expected='https://github.com/Blackmarket-coa/blackout.git'
          actual="$(git config -f .gitmodules --get submodule.cinny.url)"
          test "$actual" = "$expected"

      - name: Initialize cinny submodule from remote HEAD
        run: |
          git submodule sync --recursive
          git submodule update --init --remote --depth 1 cinny
          git -C cinny rev-parse --short HEAD
